name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Install Android SDK 35
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-35" 2>/dev/null || true

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Build CLI shadow jar
        run: ./gradlew :antik:shadowJar

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RePairip-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload CLI jar
        uses: actions/upload-artifact@v4
        with:
          name: RePairip-CLI
          path: antik/build/libs/RePairip.jar
